<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Story</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 520px;
      margin: 60px auto;
      padding: 24px;
      background: #f7f7f7;
    }

    .card {
      background: #ffffff;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }

    h2 {
      margin-top: 0;
    }

    button {
      margin-top: 22px;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #111827;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #374151;
    }

    .info {
      margin-top: 20px;
      padding: 12px;
      background: #f1f5f9;
      border-radius: 8px;
      word-break: break-word;
    }

    .label {
      font-weight: bold;
      margin-top: 12px;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>User Story</h2>

  <div class="info">
    <div class="label">Story Name</div>
    <div id="category"></div>

    <div class="label">Sub Story Name</div>
    <div id="subCategory"></div>
  </div>

  <button onclick="goBack()">Back</button>
</div>

<script>
  const params = new URLSearchParams(window.location.search);

  document.getElementById("category").textContent =
    params.get("category") || "";

  document.getElementById("subCategory").textContent =
    params.get("subCategory") || "";

  function goBack() {
    window.location.href =
      "/VNPT-story-redirection/";
  }
</script>

</body>
</html>
